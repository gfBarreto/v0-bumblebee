[servo wipeServo]
pin: PA1
initial_angle: 75
minimum_pulse_width: 0.0005  # 0.5ms
maximum_pulse_width: 0.0025  # 2.5ms
maximum_servo_angle: 360


[gcode_macro NW_BUCKET_POS]
# Sensible values for variable_x would be 0, but adjust as per the instructions
variable_x: 14
# Sensible values for variable_y would be around 90, but adjust as per the instructions
variable_y: 103
# Sensible value for variable_z is 50
variable_z: 28
gcode:
  M118 bucket pos X:{printer["gcode_macro NW_BUCKET_POS"].x} Y:{printer["gcode_macro NW_BUCKET_POS"].y} Z:{printer["gcode_macro NW_BUCKET_POS"].z}

[gcode_macro NW_DEPLOY]
description: "Abre o braço do servo do wipe garantindo Z mínimo para não bater na mesa"
variable_min_z_deploy: 28.0
variable_deploy_angle: 265
variable_servo_settle_ms: 250
variable_z_f: 5000

gcode:
    {% set minz = (params.MINZ | default(printer["gcode_macro NW_DEPLOY"].min_z_deploy)) | float %}
    {% set ang  = (params.ANGLE | default(printer["gcode_macro NW_DEPLOY"].deploy_angle)) | float %}
    {% set settle = (params.SETTLE | default(printer["gcode_macro NW_DEPLOY"].servo_settle_ms)) | int %}
    {% set zf = (params.ZF | default(printer["gcode_macro NW_DEPLOY"].z_f)) | float %}

    M400
    G90

    # Só aumenta Z se estiver abaixo do mínimo (na V0 isso "desce a mesa")
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F{zf}
        M400
    {% endif %}

    G4 P50
    SET_SERVO SERVO=wipeServo ANGLE={ang}
    G4 P{settle}


[gcode_macro NW_WIPE]
description: "Movimento de limpeza na escova (mantém Z, mas garante Z>=28 antes de entrar)"
# Ajuste os pontos conforme sua escova
variable_x1: 24
variable_y1: 119
variable_x2: 24
variable_y2: 94

variable_cycles: 4
variable_wipe_f: 6000
variable_travel_f: 12000

variable_min_z: 28.0
variable_z_f: 5000

gcode:
    {% set x1 = (params.X1 | default(printer["gcode_macro NW_WIPE"].x1)) | float %}
    {% set y1 = (params.Y1 | default(printer["gcode_macro NW_WIPE"].y1)) | float %}
    {% set x2 = (params.X2 | default(printer["gcode_macro NW_WIPE"].x2)) | float %}
    {% set y2 = (params.Y2 | default(printer["gcode_macro NW_WIPE"].y2)) | float %}

    {% set cycles = (params.CYCLES | default(printer["gcode_macro NW_WIPE"].cycles)) | int %}
    {% set f = (params.F | default(printer["gcode_macro NW_WIPE"].wipe_f)) | float %}
    {% set tf = (params.TF | default(printer["gcode_macro NW_WIPE"].travel_f)) | float %}

    {% set minz = (params.MINZ | default(printer["gcode_macro NW_WIPE"].min_z)) | float %}
    {% set zf = (params.ZF | default(printer["gcode_macro NW_WIPE"].z_f)) | float %}

    M400
    G90

    # Garante Z mínimo também aqui (caso chamem NW_WIPE direto)
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F{zf}
        M400
    {% endif %}

    # Aproxima e faz o vai-e-volta
    G0 X{x1} Y{y1} F{tf}
    {% for i in range(cycles) %}
        G0 X{x2} Y{y2} F{f}
        G0 X{x1} Y{y1} F{f}
    {% endfor %}


[gcode_macro NW_RETRACT]
description: "Recolhe o braço e sacode perto do retract para soltar o poop fora da área"
variable_retract_angle: 75
variable_deploy_angle: 265
variable_servo_settle_ms: 200

# Sacudidas perto do retract
variable_r_jiggle_angle: 95          # ângulo "perto do retract" (75->95)
variable_r_micro_wiggles: 1          # micro-batidas
variable_r_micro_pause_ms: 90

# Sacudidas um pouco mais amplas (ainda fora da área)
variable_r_big_angle: 115            # ângulo maior (75->115), opcional
variable_r_big_wiggles: 1
variable_r_big_pause_ms: 140

variable_pwm_off: 1

gcode:
    {% set r_ang  = (params.R_ANGLE | default(printer["gcode_macro NW_RETRACT"].retract_angle)) | float %}
    {% set settle = (params.SETTLE  | default(printer["gcode_macro NW_RETRACT"].servo_settle_ms)) | int %}

    {% set jig_ang = (params.J_ANGLE | default(printer["gcode_macro NW_RETRACT"].r_jiggle_angle)) | float %}
    {% set mw      = (params.MICRO_WIGGLES | default(printer["gcode_macro NW_RETRACT"].r_micro_wiggles)) | int %}
    {% set mpause  = (params.MICRO_PAUSE   | default(printer["gcode_macro NW_RETRACT"].r_micro_pause_ms)) | int %}

    {% set big_ang = (params.B_ANGLE | default(printer["gcode_macro NW_RETRACT"].r_big_angle)) | float %}
    {% set bw      = (params.BIG_WIGGLES | default(printer["gcode_macro NW_RETRACT"].r_big_wiggles)) | int %}
    {% set bpause  = (params.BIG_PAUSE   | default(printer["gcode_macro NW_RETRACT"].r_big_pause_ms)) | int %}

    {% set pwm_off = (params.PWM_OFF | default(printer["gcode_macro NW_RETRACT"].pwm_off)) | int %}

    # Segurança: garante que os ângulos de jiggle/big não fiquem "do lado errado" do retract
    {% if jig_ang < r_ang %}{% set jig_ang = r_ang %}{% endif %}
    {% if big_ang < r_ang %}{% set big_ang = r_ang %}{% endif %}

    M400
    G4 P50

    # Vai para retract (fora da área de impressão)
    SET_SERVO SERVO=wipeServo ANGLE={r_ang}
    G4 P{settle}

    # Micro-batidas perto do retract (75 <-> ~95)
    {% for i in range(mw) %}
        SET_SERVO SERVO=wipeServo ANGLE={jig_ang}
        G4 P{mpause}
        SET_SERVO SERVO=wipeServo ANGLE={r_ang}
        G4 P{mpause}
    {% endfor %}

    # Batidas mais amplas (75 <-> ~115), opcional
    {% for i in range(bw) %}
        SET_SERVO SERVO=wipeServo ANGLE={big_ang}
        G4 P{bpause}
        SET_SERVO SERVO=wipeServo ANGLE={r_ang}
        G4 P{bpause}
    {% endfor %}

    # Finaliza em retract
    SET_SERVO SERVO=wipeServo ANGLE={r_ang}
    G4 P{settle}

    {% if pwm_off|int == 1 %}
        SET_SERVO SERVO=wipeServo WIDTH=0
        G4 P50
    {% endif %}


[gcode_macro NW_CLEAN_NOZZLE]
description: "Rotina completa de limpeza: Z>=28 -> deploy -> wipe -> retract e volta"
gcode:
    SAVE_GCODE_STATE NAME=NW_CLEAN_STATE
    M400
    G90

    # Segurança: garante Z mínimo antes de QUALQUER deploy
    {% set minz = printer["gcode_macro NW_DEPLOY"].min_z_deploy | float %}
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F5000
        M400
    {% endif %}

    NW_DEPLOY
    NW_WIPE
    NW_RETRACT

    RESTORE_GCODE_STATE NAME=NW_CLEAN_STATE MOVE=1

[gcode_macro NW_PURGE]
description: "Purge no bucket sem 'subir' a mesa: garante apenas Z mínimo seguro. Opcional: refrigerar filamento ao final"
variable_min_z: 28.0
variable_z_f: 5000

# Refrigerar após purga (opcional)
variable_cool_enable: 1
variable_cool_retract_mm: 1.2
variable_cool_retract_f: 1800
variable_cool_fan_percent: 70
variable_cool_ms: 1500

# Nome da fan lateral (fan_generic)
variable_side_fan_name: Fan

gcode:
    G90
    M400

    {% set minz = (params.MINZ | default(printer["gcode_macro NW_PURGE"].min_z)) | float %}
    {% set zf   = (params.ZF   | default(printer["gcode_macro NW_PURGE"].z_f)) | float %}

    {% set cool_en   = (params.COOL | default(printer["gcode_macro NW_PURGE"].cool_enable)) | int %}
    {% set c_ret_mm  = (params.COOL_RETRACT_MM | default(printer["gcode_macro NW_PURGE"].cool_retract_mm)) | float %}
    {% set c_ret_f   = (params.COOL_RETRACT_F  | default(printer["gcode_macro NW_PURGE"].cool_retract_f)) | int %}
    {% set c_fan_pct = (params.COOL_FAN_PCT    | default(printer["gcode_macro NW_PURGE"].cool_fan_percent)) | float %}
    {% set c_ms      = (params.COOL_MS         | default(printer["gcode_macro NW_PURGE"].cool_ms)) | int %}

    {% set fan_name  = (params.FAN | default(printer["gcode_macro NW_PURGE"].side_fan_name)) | string %}

    # Salva estado do G-code (modos/posição). Não inclui fan.
    SAVE_GCODE_STATE NAME=NW_PURGE_STATE

    # Lê velocidade atual da fan lateral [fan_generic Fan]
    {% set prev_fan = printer["fan_generic " ~ fan_name].speed | float %}

    # Só mexe no Z se estiver abaixo do mínimo
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F{zf}
        M400
    {% endif %}

    # Vai para o bucket em XY
    G0 X{printer["gcode_macro NW_BUCKET_POS"].x} Y{printer["gcode_macro NW_BUCKET_POS"].y} F5000

    {% if printer.extruder.temperature >= 180 %}
        M83
        G1 E50 F150
        G1 E-2 F{150 * 750}
        G4 P2000
        G92 E0
    {% else %}
        # Restaura fan e estado antes de abortar
        SET_FAN_SPEED FAN={fan_name} SPEED={prev_fan}
        RESTORE_GCODE_STATE NAME=NW_PURGE_STATE
        { action_raise_error("Nozzle Temp must be > 180C") }
    {% endif %}

    # Refrigerar filamento ao final da purga (opcional)
    {% if cool_en|int == 1 %}
        M83
        G1 E-{c_ret_mm} F{c_ret_f}

        {% set target = (c_fan_pct / 100.0) %}
        {% if target < 0.0 %}{% set target = 0.0 %}{% endif %}
        {% if target > 1.0 %}{% set target = 1.0 %}{% endif %}

        SET_FAN_SPEED FAN={fan_name} SPEED={target}
        G4 P{c_ms}
    {% endif %}

    # Restaura a velocidade exata que estava antes
    SET_FAN_SPEED FAN={fan_name} SPEED={prev_fan}

    # Restaura demais estados do G-code
    RESTORE_GCODE_STATE NAME=NW_PURGE_STATE




[gcode_macro NW_TEST_SEQUENCE]
description: "Testa sequência completa N vezes: deploy -> purge -> wipe -> retract"
gcode:
    {% set cycles = (params.CYCLES | default(1)) | int %}
    
    {% for i in range(cycles) %}
        { action_respond_info("Executando ciclo %d de %d" % (i + 1, cycles)) }
        NW_DEPLOY
        NW_PURGE
        NW_WIPE
        NW_RETRACT
        
        # Pausa entre ciclos (exceto no último)
        {% if i < (cycles - 1) %}
            G4 P1000
        {% endif %}
    {% endfor %}
    
    { action_respond_info("Teste completo: %d ciclos executados" % cycles) }


