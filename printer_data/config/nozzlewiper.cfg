[servo wipeServo]
pin: PA1
initial_angle: 75
minimum_pulse_width: 0.0005  # 0.5ms
maximum_pulse_width: 0.0025  # 2.5ms
maximum_servo_angle: 360

[gcode_macro NW_CLEAN_NOZZLE]
description: "Limpeza completa do bico: garante Z>=28, deploy/wipe/retract e retorna"
gcode:
    SAVE_GCODE_STATE NAME=NW_CLEAN_STATE
    M400
    G90

    # Garante Z mínimo antes de abrir o braço
    {% set minz = printer["gcode_macro NW_DEPLOY"].min_z_deploy | float %}
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F5000
        M400
    {% endif %}

    NW_DEPLOY
    NW_WIPE
    NW_RETRACT

    RESTORE_GCODE_STATE NAME=NW_CLEAN_STATE MOVE=1

[gcode_macro NW_BUCKET_POS]
# Sensible values for variable_x would be 0, but adjust as per the instructions
variable_x: 14
# Sensible values for variable_y would be around 90, but adjust as per the instructions
variable_y: 103
# Sensible value for variable_z is 50
variable_z: 28
gcode:
  M118 bucket pos X:{printer["gcode_macro NW_BUCKET_POS"].x} Y:{printer["gcode_macro NW_BUCKET_POS"].y} Z:{printer["gcode_macro NW_BUCKET_POS"].z}

[gcode_macro NW_DEPLOY]
description: "Abre o servo do wipe garantindo Z mínimo (não deixa braço bater na mesa)"
variable_min_z_deploy: 28.0     # Z mínimo para permitir deploy sem bater
variable_deploy_angle: 265        # AJUSTE: ângulo de abrir
variable_servo_settle_ms: 250

gcode:
    {% set minz = (params.MINZ | default(printer["gcode_macro NW_DEPLOY"].min_z_deploy)) | float %}
    {% set ang  = (params.ANGLE | default(printer["gcode_macro NW_DEPLOY"].deploy_angle)) | float %}
    {% set settle = (params.SETTLE | default(printer["gcode_macro NW_DEPLOY"].servo_settle_ms)) | int %}

    M400
    G90

    # Se Z atual for menor que minz, sobe para minz (na V0: mesa desce)
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F5000
        M400
    {% endif %}

    G4 P50
    SET_SERVO SERVO=wipeServo ANGLE={ang}
    G4 P{settle}

    
#[gcode_macro NW_RETRACT]
#gcode:
#    SET_SERVO SERVO=wipeServo ANGLE=75
#    SET_SERVO SERVO=wipeServo WIDTH=0 # OFF
#    G4 P500

[gcode_macro NW_RETRACT]
description: "Retrai o servo com sincronização (evita precisar clicar 2x)"
variable_retract_angle: 75       # AJUSTE: ângulo de recolher
variable_servo_settle_ms: 250

gcode:
    {% set ang  = (params.ANGLE | default(printer["gcode_macro NW_RETRACT"].retract_angle)) | float %}
    {% set settle = (params.SETTLE | default(printer["gcode_macro NW_RETRACT"].servo_settle_ms)) | int %}

    M400
    G4 P50

    SET_SERVO SERVO=wipeServo ANGLE={ang}
    G4 P{settle}

    # Desliga PWM (boa prática)
    SET_SERVO SERVO=wipeServo WIDTH=0
    G4 P50


[gcode_macro NW_WIPE]
description: "Limpeza do bico (vai-e-volta) com limites e Z mínimo seguro"
# Ponto A
variable_x1: 24
variable_y1: 119
# Ponto B
variable_x2: 24
variable_y2: 94

variable_cycles: 4
variable_wipe_f: 6000
variable_pre_entry: 2
variable_safe_margin: 0.5

# Z mínimo para poder entrar/limpar sem bater o braço/mesa
variable_min_z: 28.0

# Velocidade de travel
variable_travel_f: 12000

gcode:
    {% set x1 = (params.X1 | default(printer["gcode_macro NW_WIPE"].x1)) | float %}
    {% set y1 = (params.Y1 | default(printer["gcode_macro NW_WIPE"].y1)) | float %}
    {% set x2 = (params.X2 | default(printer["gcode_macro NW_WIPE"].x2)) | float %}
    {% set y2 = (params.Y2 | default(printer["gcode_macro NW_WIPE"].y2)) | float %}

    {% set cycles = (params.CYCLES | default(printer["gcode_macro NW_WIPE"].cycles)) | int %}
    {% set f  = (params.F  | default(printer["gcode_macro NW_WIPE"].wipe_f)) | float %}
    {% set pre = (params.PRE | default(printer["gcode_macro NW_WIPE"].pre_entry)) | float %}
    {% set minz = (params.MINZ | default(printer["gcode_macro NW_WIPE"].min_z)) | float %}
    {% set travel_f = (params.TF | default(printer["gcode_macro NW_WIPE"].travel_f)) | float %}

    # Limites com margem
    {% set xmin = printer.toolhead.axis_minimum.x | float %}
    {% set ymin = printer.toolhead.axis_minimum.y | float %}
    {% set xmax = printer.toolhead.axis_maximum.x | float %}
    {% set ymax = printer.toolhead.axis_maximum.y | float %}
    {% set margin = printer["gcode_macro NW_WIPE"].safe_margin | float %}
    {% set xmin_e = xmin + margin %}
    {% set ymin_e = ymin + margin %}
    {% set xmax_e = xmax - margin %}
    {% set ymax_e = ymax - margin %}

    {% if x1 < xmin_e or x1 > xmax_e or y1 < ymin_e or y1 > ymax_e %}
        { action_raise_error("NW_WIPE: Ponto A (%.1f,%.1f) fora dos limites" % (x1, y1)) }
    {% endif %}
    {% if x2 < xmin_e or x2 > xmax_e or y2 < ymin_e or y2 > ymax_e %}
        { action_raise_error("NW_WIPE: Ponto B (%.1f,%.1f) fora dos limites" % (x2, y2)) }
    {% endif %}

    # Direção A->B
    {% set dx = x2 - x1 %}
    {% set dy = y2 - y1 %}
    {% set dist = (dx*dx + dy*dy) ** 0.5 %}
    {% if dist > 0.0001 %}
        {% set ux = dx / dist %}
        {% set uy = dy / dist %}
    {% else %}
        {% set ux = 0 %}
        {% set uy = 0 %}
    {% endif %}

    # Pré-entrada antes de A (oposto A->B), com clamp
    {% set x_pre_raw = x1 - ux * pre %}
    {% set y_pre_raw = y1 - uy * pre %}
    {% set x_pre = (xmin_e if x_pre_raw < xmin_e else (xmax_e if x_pre_raw > xmax_e else x_pre_raw)) %}
    {% set y_pre = (ymin_e if y_pre_raw < ymin_e else (ymax_e if y_pre_raw > ymax_e else y_pre_raw)) %}

    M400
    G90

    # Garante Z mínimo (só sobe, nunca desce)
    {% if printer.toolhead.position.z | float < minz %}
        G0 Z{minz} F5000
        M400
    {% endif %}

    # Aproxima e faz wipe
    G0 X{x_pre} Y{y_pre} F{travel_f}
    G0 X{x1}    Y{y1}    F{travel_f}

    {% for i in range(cycles) %}
        G0 X{x2} Y{y2} F{f}
        G0 X{x1} Y{y1} F{f}
    {% endfor %}


[gcode_macro NW_PURGE]
gcode:
    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z} F5000
    G0 X{printer["gcode_macro NW_BUCKET_POS"].x} Y{printer["gcode_macro NW_BUCKET_POS"].y} F5000
    {% if printer.extruder.temperature >= 180 %}
       M83
       G1 E10 F150
       G1 E-2 F{150 * 750}
       G4 P{2000}
       G92 E0
    {% else %}
      { action_raise_error("Nozzle Temp must be > 180C") }
    {% endif %}

[gcode_macro NW_TEST_SEQUENCE]
gcode:
    NW_DEPLOY
    NW_PURGE
    NW_WIPE
    NW_RETRACT

