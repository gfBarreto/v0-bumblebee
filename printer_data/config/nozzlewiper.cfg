[servo wipeServo]
pin: PA1
initial_angle: 75
minimum_pulse_width: 0.0005  # 0.5ms
maximum_pulse_width: 0.0025  # 2.5ms
maximum_servo_angle: 360

[gcode_macro NW_CLEAN_NOZZLE]
gcode:
   {% if "xyz" in printer.toolhead.homed_axes %}
      SAVE_GCODE_STATE NAME=NW_CLEAN_NOZZLE
      G90
      NW_DEPLOY
      NW_PURGE
      NW_WIPE
      NW_RETRACT
      RESTORE_GCODE_STATE NAME=NW_CLEAN_NOZZLE
   {% else %}
      { action_raise_error("Home All Axis First") }
      M117 Home All Axis First
   {% endif %}

[gcode_macro NW_BUCKET_POS]
# Sensible values for variable_x would be 0, but adjust as per the instructions
variable_x: 14
# Sensible values for variable_y would be around 90, but adjust as per the instructions
variable_y: 103
# Sensible value for variable_z is 50
variable_z: 28
gcode:
  M118 bucket pos X:{printer["gcode_macro NW_BUCKET_POS"].x} Y:{printer["gcode_macro NW_BUCKET_POS"].y} Z:{printer["gcode_macro NW_BUCKET_POS"].z}

[gcode_macro NW_DEPLOY]
gcode:
    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z}
    SET_SERVO SERVO=wipeServo ANGLE=265
    G4 P500
    
[gcode_macro NW_RETRACT]
gcode:
    SET_SERVO SERVO=wipeServo ANGLE=75
    SET_SERVO SERVO=wipeServo WIDTH=0 # OFF
    G4 P500

[gcode_macro NW_WIPE]
description: "Limpeza do bico usando dois pontos X/Y (vai-e-volta)"
# Ponto A da escova
variable_x1: 24
variable_y1: 119

# Ponto B da escova
variable_x2: 24
variable_y2: 94

# Altura para limpar (normalmente a mesma Z do bucket)
variable_z: 28

# Nº de ciclos (1 ciclo = ir A->B e voltar B->A)
variable_cycles: 4

# Velocidade do wipe (mm/min)
variable_wipe_f: 6000

# Distância de aproximação antes de entrar no ponto A (em mm).
# Faz uma "pré-entrada" na direção oposta do movimento A->B para entrar mais suave.
variable_pre_entry: 5

gcode:
    {% set x1 = (params.X1 | default(printer["gcode_macro NW_WIPE"].x1)) | float %}
    {% set y1 = (params.Y1 | default(printer["gcode_macro NW_WIPE"].y1)) | float %}
    {% set x2 = (params.X2 | default(printer["gcode_macro NW_WIPE"].x2)) | float %}
    {% set y2 = (params.Y2 | default(printer["gcode_macro NW_WIPE"].y2)) | float %}

    {% set z  = (params.Z  | default(printer["gcode_macro NW_WIPE"].z)) | float %}
    {% set cycles = (params.CYCLES | default(printer["gcode_macro NW_WIPE"].cycles)) | int %}
    {% set f  = (params.F  | default(printer["gcode_macro NW_WIPE"].wipe_f)) | float %}
    {% set pre = (params.PRE | default(printer["gcode_macro NW_WIPE"].pre_entry)) | float %}

    # Vetor A->B para calcular a pré-entrada
    {% set dx = x2 - x1 %}
    {% set dy = y2 - y1 %}
    {% set dist = (dx*dx + dy*dy) ** 0.5 %}
    {% if dist > 0.0001 %}
        {% set ux = dx / dist %}
        {% set uy = dy / dist %}
    {% else %}
        {% set ux = 0 %}
        {% set uy = 0 %}
    {% endif %}

    # Pré-entrada: ponto "antes" de A, na direção oposta de A->B
    {% set x_pre = x1 - ux * pre %}
    {% set y_pre = y1 - uy * pre %}

    G90
    G0 Z{z} F5000

    # Aproxima e entra na escova
    G0 X{x_pre} Y{y_pre} F5000
    G0 X{x1}    Y{y1}    F5000

    # Wipe: vai-e-volta
    {% for i in range(cycles) %}
        G0 X{x2} Y{y2} F{f}
        G0 X{x1} Y{y1} F{f}
    {% endfor %}


[gcode_macro NW_PURGE]
gcode:
    G90
    G0 Z{printer["gcode_macro NW_BUCKET_POS"].z} F5000
    G0 X{printer["gcode_macro NW_BUCKET_POS"].x} Y{printer["gcode_macro NW_BUCKET_POS"].y} F5000
    {% if printer.extruder.temperature >= 180 %}
       M83
       G1 E10 F150
       G1 E-2 F{150 * 750}
       G4 P{2000}
       G92 E0
    {% else %}
      { action_raise_error("Nozzle Temp must be > 180C") }
    {% endif %}
